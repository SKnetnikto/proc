<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L3 Cache Detector</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; background: #f9f9f9; }
        h1 { color: #c62828; text-align: center; }
        button { display: block; margin: 2rem auto; padding: 1rem 2.5rem; font-size: 1.2rem; background: #c62828; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #b71c1c; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { text-align: center; font-size: 1.1rem; margin: 1rem 0; color: #555; }
        #result { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 1rem 0; }
        #details { background: #f0f0f0; padding: 1rem; border-radius: 6px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
        .error { color: #d32f2f; font-weight: bold; }
        .success { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🖥️ L3 Cache Detector</h1>
    <p style="text-align:center;">Определение размера L3 кэша и количества ядер</p>
    
    <button id="startBtn" onclick="startTest()">Запустить тест</button>
    <div id="status">Ожидание запуска…</div>
    <div id="result" style="display:none;"></div>
    <pre id="details" style="display:none;"></pre>

    <script type="module">
        import { startTest } from '/static/js/main.js';
        
        window.startTest = async function() {
            const status = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const details = document.getElementById('details');
            const startBtn = document.getElementById('startBtn');
            
            startBtn.disabled = true;
            status.textContent = '🔄 Запуск теста... 30–60 секунд';
            status.className = '';
            resultDiv.style.display = 'none';
            details.style.display = 'none';
            
            try {
                const report = await startTest();
                
                let html = '';
                if (report.error) {
                    throw new Error(report.error);
                }
                
                html += `<strong>🖥️ Ядер CPU:</strong> ${report.coreCount || '?'}<br>`;
                html += `<strong>🎯 L3 Cache:</strong> ${report.estimatedL3SizeKB || '?'} KB<br><br>`;
                
                if (report.cacheAnalysis?.topJump) {
                    const j = report.cacheAnalysis.topJump;
                    html += `<strong>📊 Скачок задержки:</strong><br>`;
                    html += `• Размер: ${j.size} KB<br>`;
                    html += `• Рост: ${j.absJump} мс (${j.relJump})<br>`;
                }
                
                resultDiv.innerHTML = html;
                resultDiv.style.display = 'block';
                status.textContent = '✓ Тест завершён';
                status.className = 'success';
                
                details.textContent = JSON.stringify(report, null, 2);
                details.style.display = 'block';
                
                // Отправка логов
                try {
                    await fetch('/api/log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(report)
                    });
                } catch (e) { console.error('Log error:', e); }
                
            } catch (err) {
                status.textContent = '✗ Ошибка: ' + err.message;
                status.className = 'error';
                resultDiv.innerHTML = `<span class="error">${err.message}</span>`;
                resultDiv.style.display = 'block';
            } finally {
                startBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
